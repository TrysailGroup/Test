<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Ask the AI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --bg-card: #020617;
        --accent: #3b82f6;
        --accent-soft: rgba(59, 130, 246, 0.15);
        --border-subtle: rgba(148, 163, 184, 0.25);
        --text-main: #e5e7eb;
        --text-soft: #9ca3af;
        --danger: #f97373;
        --shadow-soft: 0 18px 45px rgba(15, 23, 42, 0.75);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text",
          "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1d283a 0, #020617 45%, #000 100%);
        color: var(--text-main);
      }

      .shell {
        width: min(960px, 100% - 32px);
        padding: 1px;
        border-radius: 26px;
        background: radial-gradient(circle at top left, #38bdf8, #6366f1, #0f172a);
        box-shadow: var(--shadow-soft);
      }

      .window {
        border-radius: 25px;
        background: radial-gradient(circle at top left, #020617, #020617 55%, #020617);
        border: 1px solid rgba(148, 163, 184, 0.2);
        overflow: hidden;
        position: relative;
      }

      .window-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px;
        border-bottom: 1px solid rgba(148, 163, 184, 0.18);
        backdrop-filter: blur(16px);
        background: linear-gradient(
          to right,
          rgba(15, 23, 42, 0.9),
          rgba(15, 23, 42, 0.75),
          rgba(15, 23, 42, 0.9)
        );
      }

      .traffic-lights {
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 11px;
        height: 11px;
        border-radius: 50%;
        border: 1px solid rgba(15, 23, 42, 0.85);
      }

      .dot.red {
        background: #f97373;
      }
      .dot.yellow {
        background: #facc15;
      }
      .dot.green {
        background: #4ade80;
      }

      .title {
        font-size: 13px;
        color: var(--text-soft);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(59, 130, 246, 0.6);
        color: #bfdbfe;
      }

      .body {
        display: grid;
        grid-template-columns: minmax(0, 2.1fr) minmax(0, 2.5fr);
        gap: 1px;
        background: radial-gradient(circle at top left, #1f2937, #020617 60%);
      }

      @media (max-width: 800px) {
        .body {
          grid-template-columns: minmax(0, 1fr);
        }
      }

      .panel {
        padding: 20px 22px 22px;
        background: radial-gradient(circle at top left, #020617, #020617 60%);
      }

      .panel + .panel {
        border-left: 1px solid rgba(15, 23, 42, 0.9);
      }

      @media (max-width: 800px) {
        .panel + .panel {
          border-left: none;
          border-top: 1px solid rgba(15, 23, 42, 0.9);
        }
      }

      .panel-label {
        font-size: 11px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--text-soft);
        margin-bottom: 10px;
      }

      .panel-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 14px;
      }

      .panel-sub {
        font-size: 13px;
        color: var(--text-soft);
        margin-bottom: 18px;
      }

      .field-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 12px;
        color: var(--text-soft);
        margin-bottom: 6px;
      }

      textarea {
        width: 100%;
        min-height: 120px;
        resize: vertical;
        border-radius: 18px;
        border: 1px solid var(--border-subtle);
        background: radial-gradient(circle at top left, #020617, #020617 65%);
        color: var(--text-main);
        padding: 12px 13px;
        font: inherit;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease,
          background 0.15s ease, transform 0.06s ease;
      }

      textarea:focus {
        border-color: rgba(59, 130, 246, 0.8);
        box-shadow: 0 0 0 1px rgba(59, 130, 246, 0.4);
        background: radial-gradient(circle at top left, #020617, #020617 55%);
        transform: translateY(-1px);
      }

      textarea::placeholder {
        color: #4b5563;
      }

      .controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
        gap: 10px;
      }

      .hint {
        font-size: 11px;
        color: var(--text-soft);
      }

      .button-row {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        flex-wrap: wrap;
      }

      button {
        border-radius: 999px;
        border: none;
        font: inherit;
        padding: 8px 16px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        transition: background 0.16s ease, transform 0.06s ease,
          box-shadow 0.16s ease, color 0.16s ease, border-color 0.16s ease;
      }

      .btn-primary {
        background: linear-gradient(135deg, #3b82f6, #6366f1);
        color: white;
        box-shadow: 0 14px 30px rgba(37, 99, 235, 0.5);
      }

      .btn-primary:hover {
        background: linear-gradient(135deg, #2563eb, #4f46e5);
        transform: translateY(-1px);
        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.6);
      }

      .btn-primary:active {
        transform: translateY(0);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.9);
      }

      .btn-secondary {
        background: rgba(15, 23, 42, 0.95);
        color: var(--text-soft);
        border: 1px solid rgba(148, 163, 184, 0.5);
      }

      .btn-secondary:hover {
        color: #e5e7eb;
        background: rgba(15, 23, 42, 1);
        transform: translateY(-1px);
      }

      .btn-secondary:active {
        transform: translateY(0);
      }

      .btn-primary[disabled] {
        opacity: 0.7;
        cursor: default;
        box-shadow: none;
        transform: none;
      }

      .spinner {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        border: 2px solid rgba(248, 250, 252, 0.3);
        border-top-color: #e5e7eb;
        animation: spin 0.7s linear infinite;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .response-shell {
        border-radius: 18px;
        border: 1px solid var(--border-subtle);
        background: radial-gradient(circle at top left, #020617, #020617 65%);
        padding: 12px 13px 13px;
        min-height: 120px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .response-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 10px;
      }

      .response-title {
        font-size: 13px;
        color: var(--text-soft);
      }

      .status-pill {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid rgba(52, 211, 153, 0.7);
        background: rgba(6, 95, 70, 0.4);
        color: #bbf7d0;
      }

      .status-pill.pending {
        border-color: rgba(59, 130, 246, 0.7);
        background: var(--accent-soft);
        color: #bfdbfe;
      }

      .status-pill.error {
        border-color: rgba(248, 113, 113, 0.9);
        background: rgba(153, 27, 27, 0.6);
        color: #fecaca;
      }

      .response-body {
        font-size: 14px;
        line-height: 1.6;
        white-space: pre-wrap;
      }

      .placeholder {
        color: #4b5563;
      }

      .error-text {
        color: var(--danger);
        font-size: 13px;
        margin-top: 8px;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="window">
        <div class="window-header">
          <div class="traffic-lights">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>
          <div class="title">
            Ask the AI
            <span class="badge">Local demo</span>
          </div>
          <div style="width: 52px"></div>
        </div>
        <div class="body">
          <div class="panel">
            <div class="panel-label">Your question</div>
            <div class="panel-title">What would you like to ask?</div>
            <div class="panel-sub">
              Type any question below and the AI will answer it.
            </div>
            <label class="field-label" for="question">
              <span>Prompt</span>
              <span id="charCount">0 / 500</span>
            </label>
            <textarea
              id="question"
              maxlength="500"
              placeholder="e.g. Explain how HTTP works in simple terms."
            ></textarea>
            <div class="controls">
              <div class="hint">
                Your API key stays on your machine. No key in the browser.
              </div>
              <div class="button-row">
                <button type="button" class="btn-secondary" id="clearBtn">
                  Clear
                </button>
                <button type="button" class="btn-primary" id="askBtn">
                  <span id="askBtnText">Ask the AI</span>
                  <span id="askBtnSpinner" class="spinner" style="display: none"></span>
                </button>
              </div>
            </div>
            <div id="error" class="error-text" style="display: none"></div>
          </div>
          <div class="panel">
            <div class="panel-label">AI response</div>
            <div class="response-shell">
              <div class="response-header">
                <div class="response-title">Answer</div>
                <div id="statusPill" class="status-pill pending" style="display: none">
                  Thinking…
                </div>
              </div>
              <div id="answer" class="response-body placeholder">
                The AI’s response will appear here.
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const questionInput = document.getElementById("question");
      const askBtn = document.getElementById("askBtn");
      const askBtnText = document.getElementById("askBtnText");
      const askBtnSpinner = document.getElementById("askBtnSpinner");
      const clearBtn = document.getElementById("clearBtn");
      const answerEl = document.getElementById("answer");
      const statusPill = document.getElementById("statusPill");
      const errorEl = document.getElementById("error");
      const charCount = document.getElementById("charCount");

      questionInput.addEventListener("input", () => {
        charCount.textContent = questionInput.value.length + " / 500";
      });

      clearBtn.addEventListener("click", () => {
        questionInput.value = "";
        charCount.textContent = "0 / 500";
        questionInput.focus();
      });

      async function askQuestion() {
        const question = questionInput.value.trim();
        if (!question) {
          errorEl.textContent = "Please enter a question first.";
          errorEl.style.display = "block";
          return;
        }

        errorEl.style.display = "none";
        askBtn.disabled = true;
        askBtnText.textContent = "Asking…";
        askBtnSpinner.style.display = "inline-block";
        statusPill.style.display = "inline-flex";
        statusPill.className = "status-pill pending";
        statusPill.textContent = "Thinking…";
        answerEl.classList.remove("placeholder");
        answerEl.textContent = "Waiting for the AI to respond…";

        try {
          const res = await fetch("/api/ask", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({ question })
          });

          const data = await res.json();

          if (!res.ok) {
            throw new Error(data.error || "Request failed");
          }

          statusPill.className = "status-pill";
          statusPill.textContent = "Done";
          answerEl.textContent = data.answer || "No answer returned.";
        } catch (err) {
          console.error(err);
          statusPill.className = "status-pill error";
          statusPill.textContent = "Error";
          answerEl.classList.remove("placeholder");
          answerEl.textContent =
            "Something went wrong talking to the AI. Check that the server is running and your API key is configured.";
          errorEl.textContent = err.message;
          errorEl.style.display = "block";
        } finally {
          askBtn.disabled = false;
          askBtnText.textContent = "Ask the AI";
          askBtnSpinner.style.display = "none";
        }
      }

      askBtn.addEventListener("click", askQuestion);

      questionInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
          askQuestion();
        }
      });
    </script>
  </body>
  </html>
